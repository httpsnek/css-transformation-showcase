<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jetbrains-test-2026</title>
  </head>
  <body>
    <div id="app">
      <div class="card">
        <div class="card__badge">Most Popular</div>

        <div class="card__header">
          <h1 class="card__plan">Pro</h1>
          <p class="card__tagline">Everything you need to ship AI-powered products.</p>
        </div>

        <div class="card__price">
          <span class="card__price-currency">$</span>
          <span class="card__price-amount">49</span>
          <span class="card__price-period">/ month</span>
        </div>

        <ul class="card__features">
          <li class="card__feature">
            <span class="card__feature-icon" aria-hidden="true">✦</span>
            10 million tokens per month
          </li>
          <li class="card__feature">
            <span class="card__feature-icon" aria-hidden="true">✦</span>
            Access to all frontier models
          </li>
          <li class="card__feature">
            <span class="card__feature-icon" aria-hidden="true">✦</span>
            Priority API throughput
          </li>
          <li class="card__feature">
            <span class="card__feature-icon" aria-hidden="true">✦</span>
            99.9% uptime SLA
          </li>
          <li class="card__feature">
            <span class="card__feature-icon" aria-hidden="true">✦</span>
            Dedicated support channel
          </li>
        </ul>

        <button class="card__cta" type="button">Get started</button>

        <p class="read-the-docs">No credit card required · Cancel anytime</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
